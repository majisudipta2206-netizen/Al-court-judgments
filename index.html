<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Court Judgment Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .form-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }

        input, textarea {
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        /* THE FIX: YOU WERE MISSING THIS CLOSING TAG */
    </style> 
</head>
<body>

    <div class="container">
        <header>
            <h1>AI Court Judgment Generator</h1>
            <p class="subtitle">Enter case details to generate a legal draft</p>
        </header>

        <main class="form-section">
            <div class="form-group">
                <label>Case Number / Title</label>
                <input type="text" placeholder="e.g. Smith vs. Jones [2024]">
            </div>

            <div class="form-group">
                <label>Case Facts & Evidence</label>
                <textarea placeholder="Describe the key facts of the case..."></textarea>
            </div>

            <button class="btn">Generate Judgment</button>
        </main>
    </div>

</body>
  </html>
<section id="result-section" style="display: none; background: #f9f9f9; margin-top: 20px; padding: 25px; border-radius: 15px; border-left: 10px solid #764ba2;">
    <h2 style="color: #333; margin-bottom: 15px;">Generated Judgment Draft</h2>
    <div id="judgment-output" style="white-space: pre-wrap; font-family: 'Times New Roman', serif; line-height: 1.8; color: #222;">
        </div>
    <button onclick="window.print()" class="btn" style="margin-top: 20px; background: #444;">Print Judgment</button>
</section>

<script>
    document.querySelector('.btn').addEventListener('click', function() {
        // 1. Get input values
        const caseTitle = document.querySelector('input[type="text"]').value;
        const caseFacts = document.querySelector('textarea').value;

        if (!caseTitle || !caseFacts) {
            alert("Please fill in both the Case Title and Facts.");
            return;
        }

        // 2. Simple logic to simulate "AI" generation
        // In a real app, you would send this data to an API (like Gemini or OpenAI)
        const date = new Date().toLocaleDateString();
        
        const generatedDraft = `
IN THE HIGH COURT OF JUSTICE
Date: ${date}
Case Reference: ${caseTitle.toUpperCase()}

BETWEEN: 
The Parties as named in the title.

JUDGMENT:

1. THE FACTS: 
The court has reviewed the evidence provided: "${caseFacts}".

2. LEGAL ANALYSIS:
Having considered the statutory provisions and relevant precedents, the court finds that the burden of proof has been addressed based on the testimony and evidence presented.

3. DECISION:
Upon deliberation, the Court hereby finds in favor of the prevailing party. It is ordered that the relief sought be granted in accordance with the findings of fact established in this proceeding.

IT IS SO ORDERED.
        `;

        // 3. Display the result
        const resultSection = document.getElementById('result-section');
        const outputDiv = document.getElementById('judgment-output');
        
        outputDiv.innerText = generatedDraft;
        resultSection.style.display = 'block';

        // Scroll to the result
        resultSection.scrollIntoView({ behavior: 'smooth' });
    });
</script>
